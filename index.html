<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>海外ニュースメモ</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content">
      <div class="site-label">INTERNATIONAL NEWS CURATION</div>

      <h1>海外ニュースメモ</h1>

      <p>
        海外で話題になっている出来事を、ゆっくり整理して眺めるニュースノート。
      </p>
    </div>
  </header>

  <section class="control-area">
    <div id="siteInfo" class="site-info"></div>
    
    <div class="top-controls">
      <input
        type="text"
        id="searchInput"
        placeholder="キーワードで検索"
      >

      <button id="radioBtn" class="radio-btn">
        🎙 本日の海外ニュースを聴く
      </button>

      <button id="stopRadioBtn" class="stop-btn">
        ■ 停止
      </button>
    </div>

    <nav class="category-nav">
      <a href="#">ALL</a>
      <a href="#">WORLD</a>
      <a href="#">TECH</a>
      <a href="#">AI</a>
      <a href="#">SCIENCE</a>
      <a href="#">SPACE</a>
      <a href="#">BUSINESS</a>
      <a href="#">MYSTERY</a>
    </nav>
  </section>

  <main>
    <section class="news-grid"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
